<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>고객문의 | Smart Support Center</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="site-topbar">
        <a class="brand" href="index.html" aria-label="Smart Support Center 홈">
          <span class="brand-mark">S</span>
          <span>Smart Support Center</span>
        </a>
        <nav class="site-nav" aria-label="주요 메뉴">
          <a href="#">서비스 소개</a>
          <a href="#">이용안내</a>
          <a class="active" href="index.html">고객문의</a>
          <a href="#">공지사항</a>
        </nav>
      </div>
    </header>

    <section class="page-hero">
      <div class="hero-inner">
        <p class="breadcrumb">홈 &gt; 고객센터 &gt; 고객문의</p>
        <h1>고객문의</h1>
        <p>접수된 고객 문의를 확인하고 상세 본문을 조회할 수 있습니다.</p>
      </div>
    </section>

    <main class="layout">
      <section class="content-panel">
        <div class="section-head">
          <div>
            <h2>고객문의 목록</h2>
            <span id="resultCount">총 50건</span>
          </div>
          <button id="downloadExcelButton" class="download-button" type="button">엑셀 다운로드</button>
        </div>

        <section id="listView" class="board-view" aria-label="고객문의 목록">
          <form id="filterForm" class="filter-panel" aria-label="고객문의 조회 조건">
            <label>
              <span>분류</span>
              <select id="categoryFilter">
                <option value="">전체</option>
                <option value="배송">배송</option>
                <option value="결제/환불">결제/환불</option>
                <option value="상품">상품</option>
                <option value="서비스 이용">서비스 이용</option>
              </select>
            </label>
            <label>
              <span>검색기준</span>
              <select id="searchTypeFilter">
                <option value="title">제목</option>
                <option value="customer">고객명</option>
              </select>
            </label>
            <label>
              <span>검색어</span>
              <input id="keywordFilter" type="search" placeholder="검색어 포함">
            </label>
            <label>
              <span>기간</span>
              <select id="periodFilter">
                <option value="all">전체</option>
                <option value="1d">1일</option>
                <option value="1w">1주일</option>
                <option value="1m">1달</option>
              </select>
            </label>
            <label>
              <span>답변상태</span>
              <select id="statusFilter">
                <option value="">전체</option>
                <option value="답변대기">답변대기</option>
                <option value="답변완료">답변완료</option>
              </select>
            </label>
            <button class="search-button" type="submit">조회</button>
          </form>
          <div class="board">
            <div class="board-head">
              <span>번호</span>
              <span>분류</span>
              <span>제목</span>
              <span>고객명</span>
              <span>문의일</span>
              <span>답변상태</span>
            </div>
            <div id="postList" class="post-list"></div>
          </div>
          <nav id="pagination" class="pagination" aria-label="고객문의 페이지"></nav>
        </section>

        <section id="detailView" class="detail-view" aria-label="고객문의 상세" hidden>
          <button id="backButton" class="back-button" type="button">목록</button>
          <article id="postDetail" class="post-detail"></article>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <div>Smart Support Center</div>
      <div>고객 문의 자동 분류 및 후처리 테스트 페이지</div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
